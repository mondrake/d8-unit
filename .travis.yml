language: php

php:
  - 7.4

jobs:
  fast_finish: true

env:
  global:
    # Drupal paths.
    - DRUPAL_STAGING_DIR="$HOME/drupal_staging"
    - DRUPAL_PATH="$HOME/drupal8"
    - PATH="$PATH:$DRUPAL_PATH/vendor/bin:$HOME/.composer/vendor/bin"
    - DRUPAL_TEST_RESULTS_DIR="$HOME/drupal_test_results"
    - DRUPAL_TEST_RESULTS_DB="$DRUPAL_TEST_RESULTS_DIR/test_results.sqlite"

    # Testing environment variables.
    - SIMPLETEST_DB=mysql://root:@127.0.0.1/drupal_travis_db#d8t
    #- SIMPLETEST_DB=sqlite://localhost/sites/default/files/.ht.sqlite
    - SIMPLETEST_BASE_URL=http://127.0.0.1:8080

    # Suppress deprecation handling.
    #- SYMFONY_DEPRECATIONS_HELPER=disabled

cache:
  directories:
    - $DRUPAL_STAGING_DIR
    - $HOME/.composer/cache

services:
  - mysql

before_install:
  # Remove  XDebug.
  - phpenv config-rm xdebug.ini || true

  # Create the test db.
  - mysql -e 'CREATE DATABASE IF NOT EXISTS drupal_travis_db;'

  # Add a directory for test results SQLite db.
  - mkdir $DRUPAL_TEST_RESULTS_DIR

  # Stage Drupal codebase.
  - |
      if [[ ! -f $DRUPAL_STAGING_DIR/index.php ]]; then
        git clone --depth=5 --branch=9.1.x http://git.drupal.org/project/drupal.git $DRUPAL_STAGING_DIR
        cd $DRUPAL_STAGING_DIR
        composer install --no-progress --no-suggest
        composer require drush/drush --no-progress --no-suggest
        COMPOSER_MEMORY_LIMIT=-1 composer require drupal/imagemagick drupal/image_effects:^3 --no-progress --no-suggest
        rm -r module/contrib/image_effects
        git clone --depth=5 --branch=8.x-3.x http://git.drupal.org/project/image_effects.git module/contrib/image_effects
      fi

  # Copy staged codebase to live.
  - ls $DRUPAL_STAGING_DIR/module/contrib/image_effects
  - cp -r $DRUPAL_STAGING_DIR/. $DRUPAL_PATH

  # Apply Drupal core patches.
  - cd $DRUPAL_PATH/modules/contrib/image_effects
  #- curl https://www.drupal.org/files/issues/2020-09-17/3055193-111.patch | git apply -v
  - git apply -v $TRAVIS_BUILD_DIR/test.patch
  #- composer run-script drupal-phpunit-upgrade

install:
  - cd $DRUPAL_PATH/core
  - drush site-install standard --db-url=$SIMPLETEST_DB -y
  - drush en image_effects -y
  - drush runserver 127.0.0.1:8080 &
  - sleep 2s

script:
  #- ../vendor/bin/phpunit "modules/contrib/image_effects/tests/src/Functional/Effect/SmartCropTest.php"
  - ../vendor/bin/phpunit --group "Image Effects"

notifications:
  email:
    on_success: never
